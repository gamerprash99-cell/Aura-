<style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #f7fafc 0%, #eddcff 50%, #c8e6ff 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-overlay {
            backdrop-filter: blur(20px);
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .fade-in-up {
            animation: fadeInUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative font-sans text-on-surface">
<!-- Ambient Mesh Gradient Overlay (Base Depth) -->
<div class="absolute inset-0 w-full h-full opacity-60 mix-blend-multiply pointer-events-none" style="background: radial-gradient(circle at 20% 30%, rgba(214, 188, 250, 0.4) 0%, transparent 50%),
                    radial-gradient(circle at 80% 70%, rgba(165, 204, 233, 0.4) 0%, transparent 50%);">
</div>
<!-- Glassmorphic Canvas Layer -->
<div class="absolute inset-0 w-full h-full glass-overlay pointer-events-none"></div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center justify-center text-center p-md max-w-sm w-full mx-auto">
<!-- Animated Logo Container -->
<div class="w-48 h-48 md:w-64 md:h-64 mb-xl relative fade-in-up" style="animation-delay: 0.2s;">
<!-- STITCH_SVG_START:ANIMATION_3 class="absolute inset-0 w-full h-full drop-shadow-2xl" --><div class="absolute inset-0 w-full h-full drop-shadow-2xl" id="animated-svg-ANIMATION_3" style="display:block;"><svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="aura-grad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#d6bcfa;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#fbd38d;stop-opacity:1"></stop>
</lineargradient>
<filter height="140%" id="blur" width="140%" x="-20%" y="-20%">
<fegaussianblur in="SourceGraphic" stddeviation="5"></fegaussianblur>
</filter>
</defs>
<!-- Background Glow -->
<circle cx="100" cy="100" fill="url(#aura-grad)" filter="url(#blur)" opacity="0.6" r="80">
<animate attributename="r" dur="4s" repeatcount="indefinite" values="75;85;75"></animate>
</circle>
<!-- Main Logo Shape -->
<path d="M100 40C66.8629 40 40 66.8629 40 100C40 133.137 66.8629 160 100 160C133.137 160 160 133.137 160 100C160 66.8629 133.137 40 100 40ZM100 145C75.1472 145 55 124.853 55 100C55 75.1472 75.1472 55 100 55C124.853 55 145 75.1472 145 100C145 124.853 124.853 145 100 145Z" fill="white">
<animatetransform attributename="transform" dur="10s" from="0 100 100" repeatcount="indefinite" to="360 100 100" type="rotate"></animatetransform>
</path>
<circle cx="100" cy="100" fill="white" opacity="0.9" r="30">
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.6;1;0.6"></animate>
</circle>
</svg></div><!-- STITCH_SVG_END:ANIMATION_3 -->
</div>
<!-- Typography -->
<h1 class="font-display-md text-display-md md:font-display-lg md:text-display-lg bg-clip-text text-transparent bg-gradient-to-r from-primary to-tertiary mb-sm fade-in-up" style="animation-delay: 0.6s;">
            Aura
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant fade-in-up" style="animation-delay: 0.8s;">
            Organize your life beautifully.
        </p>
<!-- Loading Indicator (Subtle) -->
<div class="mt-xl fade-in-up" style="animation-delay: 1.2s;">
<div class="w-12 h-1 bg-surface-variant rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary-container rounded-full animate-[pulse_1.5s_ease-in-out_infinite] w-full origin-left"></div>
</div>
</div>
</main>
