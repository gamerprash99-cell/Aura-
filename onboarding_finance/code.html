<body class="mesh-bg min-h-screen text-on-surface antialiased overflow-hidden flex flex-col items-center justify-center relative">
<!-- Top App Bar (Suppressed for Onboarding, simplified for skip) -->

<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors">

        </button>
</header>

<!-- Illustration Area -->
<div class="flex-1 flex items-center justify-center mb-8 relative">
<div class="relative w-full aspect-[3/4] max-w-sm rounded-xl overflow-hidden glass-panel shadow-lg">
<img alt="Gen-Z aesthetic illustration for an expense tracking app onboarding" class="w-full h-full object-cover object-center absolute inset-0 mix-blend-multiply opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBV8LEkGSm6tX3NELj1-PrLsZT9bfD0riiyZZTKiZXwNANSjtvYUJ3R9bHWKWy1y_VvPgD4Mpd4lydJQjFBSmbCQwKOVKl0LNsF78RfXP3XXNYm6PRwAPJLqXS3mpNyBtaITK7pDmc0f9qo250f-gh6MH7q9XIucrQ4Mo6ZL5JqYGA5tY8UwErYFIwYE4G7NWZtsDLBoN7OlsXjDwdvLI3yVj5-TVqg-ZYrvkQ5oaxJ-oqFnDUJ4DhTGg"/>

<div class="absolute inset-0 bg-gradient-to-t from-white/60 via-transparent to-transparent pointer-events-none"></div>
</div>
</div>
<!-- Content Area -->
<div class="glass-panel rounded-xl p-6 flex flex-col items-center text-center shadow-[0_8px_32px_rgba(106,84,138,0.05)] transform transition-all duration-500 translate-y-0">
<!-- Progress Indicators -->
<div class="flex gap-2 mb-6">
<div class="w-2 h-2 rounded-full bg-outline-variant/50"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/50"></div>
<div class="w-8 h-2 rounded-full bg-gradient-to-r from-primary to-inverse-primary"></div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">Smart Savings</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl px-4">
                Track expenses and bills effortlessly with AI insights.
            </p>
<button class="w-full h-14 rounded-full bg-gradient-to-r from-primary to-inverse-primary text-on-primary font-label-lg text-label-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-md group border border-white/20">
                Get Started
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 1;">
                    arrow_forward
                </span>
</button>
</div>
</main>
<!-- Ambient Floating Elements -->
<div class="absolute top-1/4 left-4 w-12 h-12 rounded-full bg-white/30 backdrop-blur-md border border-white/40 shadow-sm animate-pulse" style="animation-duration: 4s;"></div>
<div class="absolute bottom-1/3 right-8 w-16 h-16 rounded-xl rotate-12 bg-primary/10 backdrop-blur-lg border border-primary/20 shadow-sm animate-pulse" style="animation-duration: 6s;"></div>
